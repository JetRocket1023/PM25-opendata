name: Scheduled Python Script

on:
  schedule:
    - cron: '59 15 * * *' # 每天國際標準時間 00:00 (台灣時間 08:00)
  workflow_dispatch: # 允許手動觸發
env:
  # 提前應對 2026 年的 Node 升級警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  run-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip' # 開啟快取功能，加快後續運行速度

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run script
        run: python PM25.py
        env:

          HOST: ${{ secrets.HOST}}
          PORT: ${{ secrets.PORT}}
          USER: ${{ secrets.USER}}
          PASSWORD: ${{ secrets.PASSWORD}}
          NAME: ${{ secrets.NAME}}
          